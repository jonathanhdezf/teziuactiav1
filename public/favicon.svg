<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="rgba(249,115,22,0.3)" stroke-width="1.5"/>
  
  <!-- Motorcycle Wheel (back) -->
  <circle cx="20" cy="38" r="8" fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="20" cy="38" r="2" fill="#f97316"/>
  
  <!-- Motorcycle Wheel (front) -->
  <circle cx="44" cy="38" r="8" fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="44" cy="38" r="2" fill="#f97316"/>
  
  <!-- Motorcycle Body -->
  <path d="M20 38 L28 26 L38 26 L44 38" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Seat -->
  <path d="M24 26 L32 22 L40 22" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Handlebar -->
  <path d="M40 22 L42 18 L46 16" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Exclamation Mark (petition/action) -->
  <text x="32" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="10" fill="#f97316" filter="url(#glow)">!</text>
  
  <!-- Glow accent dots -->
  <circle cx="16" cy="24" r="1" fill="#f97316" opacity="0.6"/>
  <circle cx="48" cy="28" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="32" cy="50" r="1" fill="#f97316" opacity="0.4"/>
</svg>
